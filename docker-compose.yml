# PhoenixBoot Container Orchestration
# Use with Docker Compose or Podman Compose

version: '3.9'

services:
  # Build container - EDK2 compilation and artifact building
  phoenixboot-build:
    build:
      context: .
      dockerfile: containers/build/dockerfiles/Dockerfile
    container_name: phoenixboot-build
    volumes:
      - .:/phoenixboot:Z
      - ./out:/phoenixboot/out:Z
      - build-cache:/home/phoenixbuild/.cache:Z
    environment:
      - PG_FORCE_BUILD=${PG_FORCE_BUILD:-0}
      - PYTHONUNBUFFERED=1
    networks:
      - phoenixboot-net
    profiles: ["build", "all"]
    command: bash scripts/build-production.sh

  # Test container - QEMU tests and validation
  phoenixboot-test:
    build:
      context: .
      dockerfile: containers/test/dockerfiles/Dockerfile
    container_name: phoenixboot-test
    volumes:
      - .:/phoenixboot:Z
      - ./out:/phoenixboot/out:Z
      - ./ovmf_stuff:/phoenixboot/ovmf_stuff:Z
    environment:
      - PYTHONUNBUFFERED=1
      - QEMU_TIMEOUT=300
    networks:
      - phoenixboot-net
    profiles: ["test", "all"]
    depends_on:
      - phoenixboot-build
    # Uncomment to enable KVM acceleration (requires /dev/kvm access)
    # devices:
    #   - /dev/kvm:/dev/kvm

  # Installer container - ESP manipulation and bootable media creation
  phoenixboot-installer:
    build:
      context: .
      dockerfile: containers/installer/dockerfiles/Dockerfile
    container_name: phoenixboot-installer
    volumes:
      - .:/phoenixboot:Z
      - ./out:/phoenixboot/out:Z
      - ./keys:/phoenixboot/keys:Z
    environment:
      - PYTHONUNBUFFERED=1
      - ISO_PATH=${ISO_PATH:-}
      - USB_DEVICE=${USB_DEVICE:-}
    networks:
      - phoenixboot-net
    profiles: ["installer", "all"]
    depends_on:
      - phoenixboot-build
    # Uncomment for USB device access (requires privileged mode)
    # privileged: true
    # devices:
    #   - /dev/sda:/dev/sda  # Example: adjust to your USB device

  # Runtime container - On-host operations
  phoenixboot-runtime:
    build:
      context: .
      dockerfile: containers/runtime/dockerfiles/Dockerfile
    container_name: phoenixboot-runtime
    volumes:
      - .:/phoenixboot:Z
      - /sys/firmware/efi:/sys/firmware/efi:ro
      - /boot/efi:/boot/efi:Z
      - /lib/modules:/lib/modules:ro
    environment:
      - PYTHONUNBUFFERED=1
    networks:
      - phoenixboot-net
    profiles: ["runtime", "all"]
    # Requires privileged mode for EFI variable access
    # privileged: true

  # TUI container - Interactive text user interface
  phoenixboot-tui:
    build:
      context: .
      dockerfile: containers/tui/dockerfiles/Dockerfile
    container_name: phoenixboot-tui
    volumes:
      - .:/phoenixboot:Z
      - ./out:/phoenixboot/out:Z
    environment:
      - PYTHONUNBUFFERED=1
      - TERM=${TERM:-xterm-256color}
    networks:
      - phoenixboot-net
    profiles: ["tui", "all"]
    stdin_open: true
    tty: true

volumes:
  build-cache:
    driver: local

networks:
  phoenixboot-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.21.0.0/16
